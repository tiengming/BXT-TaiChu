 >> 8 & 0x00FF) + amt;let b = (num & 0x0000FF) + amt;r = Math.max(0, Math.min(255, r));g = Math.max(0, Math.min(255, g));b = Math.max(0, Math.min(255, b));return (usePound ? '#' : '').concat((r << 16 | g << 8 | b).toString(16).padStart(6, '0'));},hexToRgb(hex) {const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})\x24/i.exec(hex);return result ? {r: parseInt(result.at(1), 16),g: parseInt(result.at(2), 16),b: parseInt(result.at(3), 16)} : { r: 30, g: 39, b: 50 };},updateStatusBar(name, phrase) {const bar = document.getElementById('status-bar');if (bar) {const weather = window.INITIAL_WEATHER || {};const desc = weather.description || '';const cond = weather.condition || 'Clear';const now = new Date();const hour = now.getHours();const isNight = weather.sunset && weather.sunrise ? (Math.floor(now.getTime()/1000) >= weather.sunset || Math.floor(now.getTime()/1000) < weather.sunrise) : (hour >= 18 || hour < 6);let timeDesc = '昼间';let advice = '宜存思';if (isNight) {timeDesc = '幽冥';advice = '宜冥想';} else if (hour < 9) {timeDesc = '晨光';advice = '宜晨省';} else if (hour > 14) {timeDesc = '午后';advice = (cond === 'Rain' || cond === 'Cloudy') ? '宜品茗' : '宜闲步';}if (cond === 'Rain') advice = '宜听雨';else if (cond === 'Storm') advice = '宜静听';bar.innerHTML = '此间 \x5B'.concat(name, ' · ', phrase, '\x5D · ').concat(desc, ' · ').concat(timeDesc, ' · ').concat(advice);}},startBreathing() {gsap.timeline({ repeat: -1, yoyo: true }).to(document.documentElement, { '--text-base-opacity': 0.4, duration: 6, ease: 'sine.inOut' });gsap.to(document.documentElement, { '--vignette-opacity': 0.08, duration: 15, repeat: -1, yoyo: true, ease: 'sine.inOut' });}};const PresenceEngine = {async init() {const pos = await this.getLocation();const dist = (pos && pos.lat && pos.lon) ? this.calculateDistance(pos.lat, pos.lon, CONFIG.DOJO_COORD.lat, CONFIG.DOJO_COORD.lon) : null;this.updateUI(dist, pos ? (pos.isCN ? pos.city : (pos.city_name || pos.city || '海外')) : '未知');},async getLocation() {if (window.INITIAL_GEO && window.INITIAL_GEO.lat && window.INITIAL_GEO.lon) {return { ...window.INITIAL_GEO, ts: Date.now() };}const cached = localStorage.getItem('bxt_location');if (cached) {const data = JSON.parse(cached);if (Date.now() - data.ts < 86400000) return data;}try {const res = await fetch('https://ipwho.is/');const data = await res.json();if (data.success) {const result = { lat: data.latitude, lon: data.longitude, city: data.city, ts: Date.now(), isCN: data.country_code === 'CN' };localStorage.setItem('bxt_location', JSON.stringify(result));return result;}} catch (e) {}return null;},calculateDistance(lat1, lon1, lat2, lon2) {try {const R = 6371;const dLat = (lat2 - lat1) * Math.PI / 180;const dLon = (lon2 - lon1) * Math.PI / 180;const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);return 2 * R * Math.asin(Math.sqrt(a));} catch (e) { return null; }},updateUI(dist, city) {const root = document.documentElement;const isInvalid = dist === null || isNaN(dist);const blur = isInvalid ? 0 : Math.min(dist / 1200, 3);const shadow = isInvalid ? 12 : Math.max(20 - (dist / 300), 8);gsap.to(root, {'--blur-strength': blur.toString().concat('px'),'--shadow-intensity': shadow.toString().concat('px'),duration: 3,ease: 'power2.out'});const footer = document.getElementById('footer-text');if (footer) {gsap.to(root, {'--text-base-opacity': 0,duration: 0.6,onComplete: () => {const distStr = isInvalid ? '遥遥' : Math.round(dist).toString().concat('公里');footer.innerHTML = '君在 \x5B'.concat(city, '\x5D，相距 ').concat(distStr, '。 © 卜仙堂 · 道隐无名');gsap.to(root, { '--text-base-opacity': 0.85, duration: 0.8 });}});}}};const Interaction = {init() {this.setupCursor();this.setupLoading();},setupCursor() {const dot = document.getElementById('cursor-dot');const trail = document.getElementById('cursor-trail');let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;let dotX = mouseX, dotY = mouseY;let trailX = mouseX, trailY = mouseY;if (window.matchMedia('(pointer: fine)').matches) {window.addEventListener('mousemove', (e) => {mouseX = e.clientX;mouseY = e.clientY;});document.querySelectorAll('a').forEach(el => {el.addEventListener('mouseenter', () => {gsap.to(dot, { scale: 3, backgroundColor: 'transparent', border: '1px solid var(--theme-color)', duration: 0.3 });gsap.to(trail, { opacity: 0, duration: 0.3 });});el.addEventListener('mouseleave', () => {gsap.to(dot, { scale: 1, backgroundColor: 'var(--theme-color)', border: 'none', duration: 0.3 });gsap.to(trail, { opacity: 0.2, duration: 0.3 });});});const render = () => {dotX += (mouseX - dotX) * 0.2; dotY += (mouseY - dotY) * 0.2;dot.style.left = dotX.toString().concat('px'); dot.style.top = dotY.toString().concat('px');trailX += (mouseX - trailX) * 0.1; trailY += (mouseY - trailY) * 0.1;trail.style.left = trailX.toString().concat('px'); trail.style.top = trailY.toString().concat('px');requestAnimationFrame(render);};render();}},setupLoading() {gsap.timeline().to('.ink-spot', { width: '400vw', height: '400vw', opacity: 0, duration: 2.5, ease: 'expo.inOut' }).to('#ink-loader', { opacity: 0, duration: 1 }, '-=1').to('.content-wrapper', { opacity: 1, y: 0, duration: 1.5, ease: 'power3.out' }, '-=1.5').set('#ink-loader', { display: 'none' });setTimeout(() => {const loader = document.getElementById('ink-loader');if (loader && loader.style.display !== 'none') {gsap.to('#ink-loader', { opacity: 0, duration: 1, onComplete: () => loader.style.display = 'none' });gsap.to('.content-wrapper', { opacity: 1, y: 0, duration: 1 });}}, 5000);}};WeatherEngine.init();ThemeEngine.init();PresenceEngine.init();Interaction.init();</script></body></html>
